name: Nightly Build

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:

  nightly-build:
    runs-on: ubuntu-latest

    outputs:
      build_date: ${{ steps.capture.outputs.build_date }}
      git_hash: ${{ steps.capture.outputs.git_hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Capture metadata
        id: capture
        run: |
          echo "build_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT
          echo "git_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc rpm dpkg-dev

      - name: Install Python build dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyinstaller

      - name: Install PythonTools
        run: |
          if [ ! -d PythonTools ]; then
            git clone https://github.com/linktech-engineering-llc/PythonTools.git
          fi
          python3 -m pip install PythonTools/

      - name: Make scripts executable
        run: chmod +x packaging/*.sh

      - name: Build all artifacts
        run: ./packaging/build_all.sh

      - name: Normalize RPM filename
        run: |
          OUT=packaging/output
          RPM_SRC=$(find $HOME/rpmbuild/RPMS -type f -name "RunUpdates-*.rpm" | head -n 1)
          if [[ -n "$RPM_SRC" ]]; then
            ARCH=$(echo "$RPM_SRC" | sed -n 's/.*\.\(.*\)\.rpm/\1/p')
            VERSION=$(basename "$RPM_SRC" | sed -n 's/RunUpdates-\(.*\)-.*\.rpm/\1/p')
            mv "$RPM_SRC" "$OUT/RunUpdates_${VERSION}.${ARCH}.rpm"
          fi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp packaging/output/RunUpdates_* artifacts/

      - name: Generate metadata.json
        run: |
          mkdir -p artifacts
          echo "{" > artifacts/metadata.json
          echo "  \"version\": \"${{ steps.capture.outputs.git_hash }}\"," >> artifacts/metadata.json
          echo "  \"date\": \"${{ steps.capture.outputs.build_date }}\"," >> artifacts/metadata.json
          echo "  \"commit\": \"${{ steps.capture.outputs.git_hash }}\"," >> artifacts/metadata.json
          echo "  \"files\": [" >> artifacts/metadata.json

          FIRST=1
          for f in artifacts/RunUpdates_*; do
            NAME=$(basename "$f")
            SIZE=$(stat -c%s "$f")
            SHA=$(sha256sum "$f" | awk '{print $1}')
            CRC=$(crc32 "$f")

            if [ $FIRST -eq 0 ]; then echo "," >> artifacts/metadata.json; fi
            FIRST=0

            echo "    {" >> artifacts/metadata.json
            echo "      \"name\": \"$NAME\"," >> artifacts/metadata.json
            echo "      \"size\": $SIZE," >> artifacts/metadata.json
            echo "      \"sha256\": \"$SHA\"," >> artifacts/metadata.json
            echo "      \"crc32\": \"$CRC\"" >> artifacts/metadata.json
            echo "    }" >> artifacts/metadata.json
          done

          echo "  ]" >> artifacts/metadata.json
          echo "}" >> artifacts/metadata.json

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-runupdates
          path: artifacts
      - name: Validate metadata.json
        run: |
          pip install jsonschema
          python3 packaging/metadata/validate.py artifacts/metadata.json

  publish-dashboard:
    runs-on: ubuntu-latest
    needs: nightly-build

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Download nightly artifacts
        uses: actions/download-artifact@v4
        with:
          name: nightly-runupdates
          path: artifacts

      - name: Generate dashboard HTML
        run: |
          META=artifacts/metadata.json
          VERSION=$(jq -r '.version' $META)
          DATE=$(jq -r '.date' $META)
          COMMIT=$(jq -r '.commit' $META)

          RELEASE_URL="https://github.com/Linktech-Engineering-LLC/RunUpdates/releases/download/nightly"

          mkdir -p dashboard
          rm -f dashboard/*

          curl -s -o dashboard/qr.png \
            "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://linktech-engineering-llc.github.io/RunUpdates/"

          cat > dashboard/index.html <<EOF
          <html>
          <head>
            <title>RunUpdates Nightly Dashboard</title>
            <style>
              body { font-family: Arial; margin: 20px; }
              table { border-collapse: collapse; margin-top: 10px; }
              th, td { padding: 8px 12px; border: 1px solid #ccc; }
              th { background: #f0f0f0; }
              h1, h2 { margin-bottom: 5px; }
              .qr { margin-top: 20px; }
            </style>
          </head>
          <body>

          <h1>RunUpdates Nightly Dashboard</h1>

          <h2>Build Metadata</h2>
          <table>
            <tr><th>Field</th><th>Value</th></tr>
            <tr><td>Version</td><td>${VERSION}</td></tr>
            <tr><td>Date</td><td>${DATE}</td></tr>
            <tr><td>Commit</td><td>${COMMIT}</td></tr>
          </table>

          <h2>Checksums & File Info</h2>
          <table>
            <tr>
              <th>File</th>
              <th>Size (bytes)</th>
              <th>SHA‑256</th>
              <th>CRC‑32</th>
              <th>Download</th>
            </tr>
          EOF

          jq -c '.files[]' $META | while read -r item; do
            NAME=$(echo "$item" | jq -r '.name')
            SIZE=$(echo "$item" | jq -r '.size')
            SHA=$(echo "$item" | jq -r '.sha256')
            CRC=$(echo "$item" | jq -r '.crc32')

            echo "<tr>" >> dashboard/index.html
            echo "<td>${NAME}</td>" >> dashboard/index.html
            echo "<td>${SIZE}</td>" >> dashboard/index.html
            echo "<td>${SHA}</td>" >> dashboard/index.html
            echo "<td>${CRC}</td>" >> dashboard/index.html
            echo "<td><a href=\"${RELEASE_URL}/${NAME}\">Download</a></td>" >> dashboard/index.html
            echo "</tr>" >> dashboard/index.html
          done

          cat >> dashboard/index.html <<EOF
          </table>

          <div class="qr">
            <h2>QR Code</h2>
            <img src="qr.png" alt="QR Code">
          </div>

          </body>
          </html>
          EOF

      - name: Publish dashboard to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r dashboard/* .

          git add .
          git commit -m "Update nightly dashboard" || echo "No changes"
          git push origin gh-pages
