# SPDX-License-Identifier: MIT
# Schema: RunUpdates Inventory Schema (v1.1)

version: 1.1

root:
  type: dict
  required: true
  children:

    "*":        # OS family (linux, windows, etc.)
      type: dict
      required: false
      inherit: true
      children:

        vars:
          type: dict
          required: false
          inherit: true

        "*":    # distro names (opensuse, redhat, debian-family)
          type: dict
          required: false
          inherit: true
          children:

            vars:
              type: dict
              required: false
              inherit: true

            packages:
              type: dict
              required: false

            hosts:
              type: dict
              required: false
              children:
                "*":
                  type: dict
                  required: true
                  inherit: true
                  children:
                    enabled:
                      type: bool
                      required: false
                    vm_host:
                      type: str
                      required: false
                    address:
                      type: list
                      required: true
